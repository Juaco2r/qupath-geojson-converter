name: Build desktop app

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Tkinter libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev tcl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate macOS ICNS icon if missing
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ ! -f "assets/icon/qupath_geojson_converter.icns" ]; then
            python - <<'PY'
          from pathlib import Path
          from PIL import Image

          ico_path = Path("assets/icon/qupath_geojson_converter.ico")
          icns_path = Path("assets/icon/qupath_geojson_converter.icns")

          if not ico_path.exists():
              raise FileNotFoundError(f"Missing icon: {ico_path}")

          img = Image.open(ico_path)
          frames = []
          for i in range(getattr(img, "n_frames", 1)):
              img.seek(i)
              frames.append(img.copy().convert("RGBA"))

          base = max(frames, key=lambda im: im.width * im.height)
          sizes = [16, 32, 64, 128, 256, 512, 1024]
          resized = [base.resize((s, s), Image.Resampling.LANCZOS) for s in sizes]

          resized[0].save(icns_path, format="ICNS", append_images=resized[1:])
          print(f"Created {icns_path}")
          PY
          fi

      - name: Build application
        run: pyinstaller --clean --noconfirm qupath_geojson_converter_gui.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuPathGeoJSONConverter-${{ runner.os }}
          path: dist/*
          if-no-files-found: error
